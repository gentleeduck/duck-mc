[workspace]
resolver = "3"
members = [
  "duck-md-core",
  "duck-md-lexer",
  "duck-md-ast",
  "duck-md-parser",
  "duck-md-codegen",
]

[workspace.package]
version = "0.1.0"
edition = "2024"

[workspace.dependencies]
# Shared across crates
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
thiserror = "1"
miette = { version = "5", features = ["fancy"] }
slug = "0.1"
duck-diagnostic = "0.1.0"
globwalk = "0.9"
tempfile = "3"
clap = { version = "4", features = ["derive"] }
toml = "0.8"
assert_cmd = "2"
predicates = "3"

# Workspace crates
duck-md-lexer = { path = "duck-md-lexer" }
duck-md-ast = { path = "duck-md-ast" }
duck-md-parser = { path = "duck-md-parser" }
duck-md-codegen = { path = "duck-md-codegen" }

# Dev
pretty_assertions = "1"
