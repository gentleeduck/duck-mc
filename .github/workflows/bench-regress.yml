name: Bench regression

# Runs the dmc-parser criterion benchmarks and compares against the
# committed baseline. Fails the build if any benchmark regresses by
# more than 10%. Runs on PRs that touch the parser/lexer/codegen so
# unrelated PRs aren't slowed by a full bench cycle.

on:
  pull_request:
    paths:
      - "dmc-lexer/**"
      - "dmc-parser/**"
      - "dmc-codegen/**"
      - "dmc-transform/**"
      - ".github/workflows/bench-regress.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  bench:
    name: cargo bench (parser)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install critcmp
        run: cargo install critcmp --locked

      # Save the PR-branch numbers under the `pr` name.
      - name: Bench PR branch
        run: cargo bench -p dmc-parser --bench parse -- --save-baseline pr

      # Check out the merge base and bench it under `base`.
      - name: Bench base branch
        run: |
          git fetch origin ${{ github.event.pull_request.base.sha }} --depth=1
          git checkout ${{ github.event.pull_request.base.sha }}
          cargo bench -p dmc-parser --bench parse -- --save-baseline base
          git checkout -

      # Fail if any benchmark is >10% slower on the PR branch.
      # critcmp does not have a built-in fail flag; parse its output
      # and exit nonzero when any PR-side ratio exceeds the threshold.
      - name: Compare
        run: |
          set -o pipefail
          critcmp base pr | tee /tmp/critcmp.out
          awk '
            NR <= 2 { next }
            NF >= 8 {
              pr_ratio = $5 + 0
              if (pr_ratio > 1.10) {
                printf "regression: %s pr is %.2fx vs base\n", $1, pr_ratio
                bad = 1
              }
            }
            END { exit bad }
          ' /tmp/critcmp.out
