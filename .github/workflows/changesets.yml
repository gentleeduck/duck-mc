name: Changesets

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

# Serialize so two pushes to master can't race the version PR.
concurrency:
  group: changesets-${{ github.ref }}
  cancel-in-progress: false

env:
  # Husky pre-commit/pre-push hooks run cargo fmt/clippy/test which needs
  # the workspace MSRV. The CI runner here only has Node + pnpm, not the
  # right toolchain, so we disable husky for this workflow.
  HUSKY: '0'

jobs:
  release:
    name: version PR / tag
    runs-on: ubuntu-latest
    # Skip on the auto-merged Version Packages commit itself unless it's
    # the merge that should fire the tag - let the action figure it out.
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          # Must be a PAT (or app token) - refs pushed with the default
          # GITHUB_TOKEN do NOT trigger downstream workflows, which would
          # leave napi-prebuilds dormant. The PAT pushes the version PR
          # commits and the @gentleduck/md@<version> tag as a real user,
          # which fires napi-prebuilds and ultimately npm publish.
          token: ${{ secrets.GH_PAT }}

      - uses: pnpm/action-setup@a3252b78c470c02df07e9d59298aecedc3ccdd6d # v3
        with:
          version: 10

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: pnpm

      - name: install deps
        run: pnpm install --frozen-lockfile=false

      - name: configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: changesets action
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1
        with:
          # Bumps versions + writes CHANGELOG via the version PR.
          version: pnpm changeset:version
          # When the PR merges and no pending changesets remain, this
          # creates per-package git tags like `@gentleduck/md@1.2.3` and
          # pushes them. The tag push is the trigger for napi-prebuilds.
          publish: pnpm changeset:tag
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
